# 맥 스튜디오(OrbStack)에서 이미지 서버 실행. 외부 공개는 Tailscale Funnel이 담당.
# - restart: unless-stopped → 부팅/도커 시작 시 자동 기동
# - 데이터는 호스트 폴더(IMAGE_DATA_PATH)에 bind mount (SSD 지금 → 나중에 DAS로 폴더만 이동)
# - localhost:8787 로 호스트에 공개 → 호스트의 Tailscale Funnel이 이 포트를 외부 HTTPS로 노출
#
# 외부 노출:  tailscale funnel --bg 8787   (고정 주소 https://<맥>.<tailnet>.ts.net)

services:
  image-server:
    build: .
    restart: unless-stopped
    environment:
      - PORT=8787
      - UPLOAD_DIR=/data
      # 업로드 허용 출처(콤마 구분). 새 앱을 붙이면 그 도메인을 여기 추가하고
      # `docker compose up -d`로 재시작하면 됨(이미지 재빌드 불필요).
      - ALLOWED_ORIGINS=https://art-auction.pages.dev,https://*.art-auction.pages.dev,https://today-mission.pages.dev,https://*.today-mission.pages.dev,https://babosam.net,https://*.babosam.net,http://localhost:5173,http://localhost:4173
      # 요청 제한(선택): IP당 창당 최대 횟수 / 창 길이(ms)
      - RL_MAX=100
      - RL_WINDOW_MS=600000
    volumes:
      - ${IMAGE_DATA_PATH:-/Users/babostudio/appdata/art-images}:/data
    ports:
      - '127.0.0.1:8787:8787'
