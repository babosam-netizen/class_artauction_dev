# 맥 스튜디오(OrbStack)에서 이미지 서버 + Cloudflare 터널 상시 운영.
# - restart: unless-stopped → 부팅/도커 시작 시 자동 기동 (수동 실행 불필요)
# - 이미지 파일은 호스트 폴더(IMAGE_DATA_PATH)에 bind mount → 나중에 DAS로 폴더만 옮기면 됨
#
# 지금(도메인 없음): 아래처럼 cloudflared가 '빠른 터널'로 임시 주소를 발급.
#   → 로그(docker compose logs cloudflared)에서 https://...trycloudflare.com 확인.
# 나중(도메인 연결): cloudflared command 를 'tunnel --no-autoupdate run' 으로 바꾸고
#   environment 에 TUNNEL_TOKEN 추가 → 고정 주소(주소 안 바뀜). 자세히는 DOCKER.md.

services:
  image-server:
    build: .
    restart: unless-stopped
    environment:
      - PORT=8787
      - UPLOAD_DIR=/data
    volumes:
      # 지금은 SSD(~/appdata/art-images). 나중에 DAS 경로로 바꾸면 됨.
      - ${IMAGE_DATA_PATH:-/Users/babostudio/appdata/art-images}:/data
    expose:
      - '8787'

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate --url http://image-server:8787
    depends_on:
      - image-server
